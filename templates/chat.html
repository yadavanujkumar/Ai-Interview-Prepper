<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interview Chat - AI Interview Prepper</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    <style>
        .chat-container {
            height: 70vh;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            overflow-y: auto;
            padding: 1rem;
            background-color: #f8f9fa;
        }
        
        .message {
            margin-bottom: 1rem;
            padding: 0.75rem 1rem;
            border-radius: 1rem;
            max-width: 75%;
        }
        
        .message.user {
            background-color: #007bff;
            color: white;
            margin-left: auto;
            text-align: right;
        }
        
        .message.ai {
            background-color: white;
            border: 1px solid #dee2e6;
            margin-right: auto;
        }
        
        .typing-indicator {
            display: none;
            font-style: italic;
            color: #6c757d;
            padding: 0.5rem 1rem;
        }
        
        .chat-input {
            border-radius: 2rem;
        }
        
        .btn-send {
            border-radius: 50%;
            width: 40px;
            height: 40px;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('main.index') }}">
                <i class="fas fa-brain me-2"></i>AI Interview Prepper
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{{ url_for('main.index') }}">
                    <i class="fas fa-home me-1"></i>Home
                </a>
            </div>
        </div>
    </nav>

    <div class="container my-4">
        <div class="row">
            <div class="col-lg-8 mx-auto">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="fas fa-comments me-2"></i>AI Interview Practice Chat
                        </h4>
                        <small>Practice your interview skills with our AI interviewer</small>
                    </div>
                    
                    <div class="card-body">
                        <!-- Session Setup (shown initially) -->
                        <div id="session-setup" class="mb-4">
                            <h5>Start Interview Session</h5>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="difficulty" class="form-label">Difficulty Level</label>
                                    <select class="form-select" id="difficulty">
                                        <option value="easy">Easy</option>
                                        <option value="medium" selected>Medium</option>
                                        <option value="hard">Hard</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="domain" class="form-label">Domain</label>
                                    <select class="form-select" id="domain">
                                        <option value="general">General</option>
                                        <option value="software_engineering">Software Engineering</option>
                                        <option value="data_science">Data Science</option>
                                        <option value="healthcare">Healthcare</option>
                                        <option value="marketing">Marketing</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="job-description" class="form-label">Job Description (Optional)</label>
                                <textarea class="form-control" id="job-description" rows="3" 
                                         placeholder="Paste the job description here for more targeted questions..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label for="cv-text" class="form-label">Your Background (Optional)</label>
                                <textarea class="form-control" id="cv-text" rows="3" 
                                         placeholder="Brief description of your background and experience..."></textarea>
                            </div>
                            <button class="btn btn-primary" onclick="startChatSession()">
                                <i class="fas fa-play me-2"></i>Start Interview
                            </button>
                        </div>

                        <!-- Chat Interface (hidden initially) -->
                        <div id="chat-interface" style="display: none;">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <div>
                                    <span class="badge bg-info">Session Active</span>
                                    <span class="text-muted ms-2" id="session-info"></span>
                                </div>
                                <button class="btn btn-outline-danger btn-sm" onclick="endChatSession()">
                                    <i class="fas fa-stop me-1"></i>End Session
                                </button>
                            </div>

                            <!-- Chat Messages -->
                            <div id="chat-messages" class="chat-container mb-3">
                                <!-- Messages will be added here dynamically -->
                            </div>
                            
                            <!-- Typing Indicator -->
                            <div id="typing-indicator" class="typing-indicator">
                                <i class="fas fa-ellipsis-h"></i> AI is typing...
                            </div>

                            <!-- Chat Input -->
                            <div class="input-group">
                                <input type="text" class="form-control chat-input" id="chat-input" 
                                       placeholder="Type your response..." onkeypress="handleKeyPress(event)">
                                <button class="btn btn-primary btn-send ms-2" onclick="sendMessage()">
                                    <i class="fas fa-paper-plane"></i>
                                </button>
                            </div>
                        </div>

                        <!-- Session Feedback (shown after ending session) -->
                        <div id="session-feedback" style="display: none;">
                            <h5><i class="fas fa-chart-line me-2"></i>Session Complete!</h5>
                            <div id="feedback-content">
                                <!-- Feedback will be loaded here -->
                            </div>
                            <button class="btn btn-primary mt-3" onclick="resetSession()">
                                <i class="fas fa-redo me-2"></i>Start New Session
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let currentSessionId = null;

        function startChatSession() {
            const jobDescription = document.getElementById('job-description').value || 'General interview practice';
            const cvText = document.getElementById('cv-text').value || 'Candidate seeking interview practice';
            const difficulty = document.getElementById('difficulty').value;
            const domain = document.getElementById('domain').value;

            const requestData = {
                job_description: jobDescription,
                cv_text: cvText,
                difficulty: difficulty,
                domain: domain
            };

            fetch('/api/v1/chat/start', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(requestData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error starting session: ' + data.error);
                    return;
                }

                currentSessionId = data.session_id;
                document.getElementById('session-setup').style.display = 'none';
                document.getElementById('chat-interface').style.display = 'block';
                document.getElementById('session-info').textContent = `${difficulty} • ${domain}`;

                // Add AI's opening message
                addMessage(data.message, 'ai');
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to start chat session');
            });
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();

            if (!message || !currentSessionId) return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';

            // Show typing indicator
            showTypingIndicator();

            // Send message to AI
            fetch('/api/v1/chat/message', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    session_id: currentSessionId,
                    message: message
                })
            })
            .then(response => response.json())
            .then(data => {
                hideTypingIndicator();

                if (data.error) {
                    addMessage('Sorry, there was an error processing your response.', 'ai');
                    return;
                }

                // Add AI response
                addMessage(data.message, 'ai');
            })
            .catch(error => {
                hideTypingIndicator();
                console.error('Error:', error);
                addMessage('Sorry, there was a connection error.', 'ai');
            });
        }

        function endChatSession() {
            if (!currentSessionId) return;

            fetch('/api/v1/chat/end', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    session_id: currentSessionId
                })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('chat-interface').style.display = 'none';
                document.getElementById('session-feedback').style.display = 'block';

                // Display feedback
                const feedbackHtml = `
                    <div class="alert alert-success">
                        <h6>Session Summary</h6>
                        <p><strong>Total Messages:</strong> ${data.total_messages}</p>
                        <p><strong>Duration:</strong> Interview practice session completed</p>
                    </div>
                    <div class="card">
                        <div class="card-body">
                            <h6>Feedback</h6>
                            <p><strong>Overall Performance:</strong> ${data.feedback.overall_performance}</p>
                            <div class="row">
                                <div class="col-md-6">
                                    <h6 class="text-success">Strengths:</h6>
                                    <ul>
                                        ${data.feedback.strengths.map(s => `<li>${s}</li>`).join('')}
                                    </ul>
                                </div>
                                <div class="col-md-6">
                                    <h6 class="text-warning">Areas for Improvement:</h6>
                                    <ul>
                                        ${data.feedback.areas_for_improvement.map(a => `<li>${a}</li>`).join('')}
                                    </ul>
                                </div>
                            </div>
                            <h6>Recommendations:</h6>
                            <ul>
                                ${data.feedback.recommendations.map(r => `<li>${r}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
                document.getElementById('feedback-content').innerHTML = feedbackHtml;

                currentSessionId = null;
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error ending session');
            });
        }

        function resetSession() {
            document.getElementById('session-feedback').style.display = 'none';
            document.getElementById('session-setup').style.display = 'block';
            document.getElementById('chat-messages').innerHTML = '';
            currentSessionId = null;
        }

        function addMessage(text, sender) {
            const messagesContainer = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            messageDiv.textContent = text;
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTypingIndicator() {
            document.getElementById('typing-indicator').style.display = 'block';
        }

        function hideTypingIndicator() {
            document.getElementById('typing-indicator').style.display = 'none';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
    </script>
</body>
</html>
